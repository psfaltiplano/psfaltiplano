<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Tabela A4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        
        /* Painel de Controle */
        .controls { 
            background: white; padding: 20px; border-radius: 8px; 
            max-width: 800px; margin: 0 auto 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #27ae60; }

        /* Área do PDF (Simulação do A4) */
        #pdf-content {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(10, 1fr);
            border: 2px solid black; /* Borda externa */
        }

        .cell {
            border: 2px solid black; /* Espessura da borda interna */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 29.7mm; /* Altura exata para caber 10 na vertical */
            box-sizing: border-box;
            text-align: center;
        }

        .cell .number {
            font-size: 32pt;
            font-weight: 800;
            margin: 0;
            line-height: 1;
        }

        .cell .label {
            font-size: 10pt;
            font-weight: 600;
            margin-top: 5px;
            text-transform: capitalize;
        }

        /* Ajuste para não duplicar bordas adjacentes */
        #pdf-content { gap: 0; margin-bottom: 50px; }
        .cell { margin: -1px; } 

        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="input-group">
            <label>Número Inicial:</label>
            <input type="number" id="startNum" value="1">
        </div>
        <div class="input-group">
            <label>Texto abaixo:</label>
            <input type="text" id="textLabel" value="Altiplano" placeholder="Ex: Altiplano">
        </div>
        <button onclick="generateGrid()">Atualizar Visualização</button>
        <button onclick="downloadPDF()" style="background: #3498db;">Baixar PDF</button>
    </div>

    <div id="pdf-content">
        </div>

    <script>
        function generateGrid() {
            const container = document.getElementById('pdf-content');
            const startNum = parseInt(document.getElementById('startNum').value);
            const labelText = document.getElementById('textLabel').value;
            
            container.innerHTML = ''; // Limpa a grade atual

            for (let i = 0; i < 50; i++) {
                const currentNum = (startNum + i).toString().padStart(2, '0');
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerHTML = `
                    <div class="number">${currentNum}</div>
                    <div class="label">${labelText}</div>
                `;
                container.appendChild(cell);
            }
        }

        function downloadPDF() {
            const element = document.getElementById('pdf-content');
            const opt = {
                margin: 0,
                filename: 'tabela-rifa.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Gera a grade inicial ao carregar a página
        generateGrid();
    </script>
</body>
</html>
