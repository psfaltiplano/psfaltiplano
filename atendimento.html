<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gestão de Filas - Modal</title>
    <style>
        :root {
            --bg-body: #f4f4f4;
            --bg-card: #ffffff;
            --text-main: #333333;
            --border-color: #dddddd;
            --tab-inactive: #eeeeee;
            --danger: #dc3545;
            --warning: #ffc107;
            --success: #28a745;
            --primary: #007bff;
            --overlay: rgba(0,0,0,0.5);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --border-color: #333333;
            --tab-inactive: #2c2c2c;
            --overlay: rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        h1 { text-align: center; font-size: 1.2rem; margin-bottom: 10px; opacity: 0.7; }

        /* Menu de Configurações */
        .menu-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .main-menu-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 24px;
        }
        .menu-options {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            width: 220px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .menu-options.active { display: block; }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 5px;
            background: rgba(150,150,150,0.1);
        }
        .menu-item.danger { color: var(--danger); background: rgba(220, 53, 69, 0.1); }

        /* Tabs */
        .tab-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 5px;
            margin-bottom: 20px;
        }
        .tab-button {
            background-color: var(--tab-inactive);
            border: none;
            padding: 10px 2px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 8px;
            color: var(--text-main);
            font-weight: bold;
        }
        .tab-button.active { background-color: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Inputs */
        .input-section {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            background-color: var(--bg-card);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .input-section input, .input-section select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-body);
            color: var(--text-main);
            font-size: 16px;
        }
        .input-section button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Lista */
        .queue-list { list-style: none; padding: 0; min-height: 100px; }
        .queue-item {
            background-color: var(--bg-card);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            border-left: 6px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .queue-item.prioridade { border-left-color: var(--danger); }
        .queue-item.normal { border-left-color: var(--success); }
        .queue-item.atendido { opacity: 0.4; text-decoration: line-through; filter: grayscale(1); }
        
        .patient-info { flex-grow: 1; cursor: pointer; padding-right: 10px; }
        .patient-info span { font-size: 1.1rem; font-weight: bold; }

        .order-controls { display: flex; flex-direction: column; gap: 4px; }
        .btn-order {
            background: var(--tab-inactive);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            color: var(--text-main);
        }

        /* MODAL / CAIXA DE DIÁLOGO */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--bg-card);
            width: 90%;
            max-width: 350px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-box h3 { margin-top: 0; font-size: 1.1rem; }
        .modal-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .modal-btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            color: white;
        }
        .btn-atender { background-color: var(--success); }
        .btn-editar { background-color: var(--warning); color: #000; }
        .btn-apagar { background-color: var(--danger); }
        .btn-cancelar { background-color: var(--tab-inactive); color: var(--text-main); }

        .editable-name {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 2px solid var(--primary);
            border-radius: 8px;
            background: var(--bg-body);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <!-- Modal de Ações -->
    <div class="modal-overlay" id="modalAction">
        <div class="modal-box">
            <h3 id="modalTitle">Paciente</h3>
            <div class="modal-actions">
                <button class="modal-btn btn-atender" onclick="actionAtendido()">✅ ATENDIDO</button>
                <button class="modal-btn btn-editar" onclick="actionEditar()">✏️ EDITAR</button>
                <button class="modal-btn btn-apagar" onclick="actionApagar()">🗑️ APAGAR</button>
                <button class="modal-btn btn-cancelar" onclick="closeModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <div class="menu-container">
        <button class="main-menu-btn" onclick="toggleMenu()">⚙️</button>
        <div class="menu-options" id="menuOptions">
            <div class="menu-item" onclick="toggleTheme()">
                <span id="themeIcon">🌙</span>&nbsp; Trocar Tema
            </div>
            <div class="menu-item" onclick="clearCurrentQueue()">
                <span>🧹</span>&nbsp; Limpar Fila Atual
            </div>
            <div class="menu-item danger" onclick="clearAllQueues()">
                <span>⚠️</span>&nbsp; Limpar Tudo
            </div>
        </div>
    </div>

    <h1>Gestão de Filas</h1>

    <div class="tab-container" id="tabs"></div>
    <div id="queue-container"></div>

    <script>
const queues = ['medica', 'vacinas', 'enfermeira', 'psicologa', 'nutricionista', 'dentista', 'novo1', 'novo2'];
let currentActiveTab = 'medica';
let queueCounters = {};
let selectedItem = null; // Armazena o item selecionado para o modal

queues.forEach(q => queueCounters[q] = { normal: 0, prioridade: 0 });

const scriptURL = "https://script.google.com/macros/s/AKfycbx7EZWyBXv5o-FjQ6ufq5DKNayATcBFMDz6540oBuzxwg0M-HCuGP_hZYGzHeg_iHRH/exec";

async function saveToLocalStorage() {
    const data = {};
    queues.forEach(q => {
        const list = document.getElementById(`list-${q}`);
        data[q] = {
            html: list.innerHTML,
            counters: queueCounters[q]
        };
    });
    localStorage.setItem('queue_data', JSON.stringify(data));
    try {
        await fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ action: "save", payload: JSON.stringify(data) })
        });
    } catch (e) { console.error("Erro na nuvem", e); }
}

async function loadFromLocalStorage() {
    const saved = localStorage.getItem('queue_data');
    if (saved) renderData(JSON.parse(saved));
    try {
        const response = await fetch(scriptURL);
        const cloudData = await response.json();
        if (cloudData) {
            renderData(cloudData);
            localStorage.setItem('queue_data', JSON.stringify(cloudData));
        }
    } catch (e) { console.log("Modo offline."); }
}

function renderData(data) {
    queues.forEach(q => {
        if (data[q]) {
            const list = document.getElementById(`list-${q}`);
            list.innerHTML = data[q].html;
            queueCounters[q] = data[q].counters;
        }
    });
}

function init() {
    const tabsDiv = document.getElementById('tabs');
    const container = document.getElementById('queue-container');

    queues.forEach((q, index) => {
        const btn = document.createElement('button');
        btn.className = `tab-button ${index === 0 ? 'active' : ''}`;
        btn.id = `btn-${q}`;
        btn.innerText = q.charAt(0).toUpperCase() + q.slice(1);
        btn.onclick = () => openTab(q);
        tabsDiv.appendChild(btn);

        const content = document.createElement('div');
        content.id = q;
        content.className = `tab-content ${index === 0 ? 'active' : ''}`;
        content.innerHTML = `
            <div class="input-section">
                <input type="text" id="input-${q}" placeholder="Nome do paciente">
                <select id="prio-${q}">
                    <option value="normal">Normal</option>
                    <option value="prioridade">Prioridade</option>
                </select>
                <button onclick="addPatient('${q}')">Adicionar Paciente</button>
            </div>
            <ul id="list-${q}" class="queue-list"></ul>
        `;
        container.appendChild(content);
    });
    loadFromLocalStorage();
}

function toggleMenu() { document.getElementById('menuOptions').classList.toggle('active'); }

function toggleTheme() {
    const body = document.documentElement;
    const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    body.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    document.getElementById('themeIcon').textContent = newTheme === 'dark' ? '☀️' : '🌙';
    toggleMenu();
}

function openTab(tabName) {
    currentActiveTab = tabName;
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    document.getElementById(`btn-${tabName}`).classList.add('active');
}

function addPatient(queueId) {
    const input = document.getElementById(`input-${queueId}`);
    const prio = document.getElementById(`prio-${queueId}`).value;
    if (!input.value.trim()) return;

    queueCounters[queueId][prio]++;
    const senha = `${queueCounters[queueId][prio]}${prio[0].toUpperCase()}`;
    
    const li = document.createElement('li');
    li.className = `queue-item ${prio}`;
    li.innerHTML = `
        <div class="patient-info" onclick="openModal(this.closest('.queue-item'))">
            <span data-senha="${senha}">${senha} - ${input.value}</span>
        </div>
        <div class="order-controls">
            <button class="btn-order" onclick="moveUp(this.closest('.queue-item'))">▲</button>
            <button class="btn-order" onclick="moveDown(this.closest('.queue-item'))">▼</button>
        </div>
    `;
    
    document.getElementById(`list-${queueId}`).prepend(li);
    input.value = '';
    saveToLocalStorage();
}

/* FUNÇÕES DO MODAL */
function openModal(el) {
    selectedItem = el;
    const name = el.querySelector('span').innerText;
    document.getElementById('modalTitle').innerText = name;
    document.getElementById('modalAction').classList.add('active');
}

function closeModal() {
    document.getElementById('modalAction').classList.remove('active');
    selectedItem = null;
}

function actionAtendido() {
    if (selectedItem) {
        selectedItem.classList.toggle('atendido');
        saveToLocalStorage();
        closeModal();
    }
}

function actionApagar() {
    if (selectedItem && confirm("Deseja excluir este paciente?")) {
        selectedItem.remove();
        saveToLocalStorage();
        closeModal();
    }
}

function actionEditar() {
    if (!selectedItem) return;
    const el = selectedItem;
    const span = el.querySelector('span');
    const currentText = span.innerText;
    const senha = span.getAttribute('data-senha');
    const nameOnly = currentText.split(' - ')[1];
    
    closeModal(); // Fecha o modal para focar no input

    const input = document.createElement('input');
    input.className = 'editable-name';
    input.value = nameOnly;
    span.style.display = 'none';
    span.parentNode.insertBefore(input, span);
    input.focus();

    const finishEdit = () => {
        span.innerText = `${senha} - ${input.value || nameOnly}`;
        span.style.display = 'block';
        input.remove();
        saveToLocalStorage();
    };

    input.onblur = finishEdit;
    input.onkeydown = (e) => { if(e.key === 'Enter') finishEdit(); };
}

/* MOVIMENTAÇÃO (SETAS) */
function moveUp(el) {
    const prev = el.previousElementSibling;
    if (prev) {
        el.parentNode.insertBefore(el, prev);
        saveToLocalStorage();
    }
}

function moveDown(el) {
    const next = el.nextElementSibling;
    if (next) {
        el.parentNode.insertBefore(next, el);
        saveToLocalStorage();
    }
}

/* GERAL */
function clearCurrentQueue() {
    if (confirm(`Zerar fila de ${currentActiveTab.toUpperCase()}?`)) {
        queueCounters[currentActiveTab] = { normal: 0, prioridade: 0 };
        document.getElementById(`list-${currentActiveTab}`).innerHTML = '';
        saveToLocalStorage();
        toggleMenu();
    }
}

function clearAllQueues() {
    if (confirm("ATENÇÃO: Deseja zerar TODAS as filas?")) {
        queues.forEach(q => {
            queueCounters[q] = { normal: 0, prioridade: 0 };
            document.getElementById(`list-${q}`).innerHTML = '';
        });
        saveToLocalStorage();
        toggleMenu();
    }
}

window.onclick = (e) => {
    if (!e.target.matches('.main-menu-btn')) {
        document.getElementById('menuOptions').classList.remove('active');
    }
    // Fecha modal se clicar fora da caixa branca
    if (e.target.classList.contains('modal-overlay')) {
        closeModal();
    }
};

const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeIcon').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

init();
    </script>
</body>
</html>
