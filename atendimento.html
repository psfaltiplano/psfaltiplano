<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gestão de Filas - Setas</title>
    <style>
        :root {
            --bg-body: #f4f4f4;
            --bg-card: #ffffff;
            --text-main: #333333;
            --border-color: #dddddd;
            --tab-inactive: #eeeeee;
            --danger: #dc3545;
            --warning: #ffc107;
            --primary: #007bff;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --border-color: #333333;
            --tab-inactive: #2c2c2c;
        }

        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        h1 { text-align: center; font-size: 1.2rem; margin-bottom: 10px; opacity: 0.7; }

        .menu-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .main-menu-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 24px;
        }

        .menu-options {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            width: 220px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .menu-options.active { display: block; }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 5px;
            background: rgba(150,150,150,0.1);
        }

        .menu-item.danger { color: var(--danger); background: rgba(220, 53, 69, 0.1); }

        .tab-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 5px;
            margin-bottom: 20px;
        }

        .tab-button {
            background-color: var(--tab-inactive);
            border: none;
            padding: 10px 2px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 8px;
            color: var(--text-main);
            font-weight: bold;
        }

        .tab-button.active { background-color: var(--primary); color: white; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .input-section {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            background-color: var(--bg-card);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .input-section input, .input-section select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-body);
            color: var(--text-main);
            font-size: 16px;
        }

        .input-section button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .queue-list { list-style: none; padding: 0; min-height: 100px; }

        .queue-item {
            background-color: var(--bg-card);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            border-left: 6px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .queue-item.prioridade { border-left-color: var(--danger); }
        .queue-item.normal { border-left-color: #28a745; }
        .queue-item.atendido { opacity: 0.4; text-decoration: line-through; filter: grayscale(1); }

        .queue-item span { font-size: 1.1rem; font-weight: bold; flex-grow: 1; }

        .actions-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .order-controls {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .btn-action {
            background: var(--tab-inactive);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete { color: var(--danger); }

        .hint {
            font-size: 0.75rem;
            text-align: center;
            margin-bottom: 10px;
            opacity: 0.6;
            line-height: 1.4;
        }

        .editable-name {
            width: 100%;
            padding: 8px;
            font-size: 1.1rem;
            background: var(--bg-body);
            color: var(--text-main);
            border: 2px solid var(--primary);
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <button class="main-menu-btn" onclick="toggleMenu()">⚙️</button>
        <div class="menu-options" id="menuOptions">
            <div class="menu-item" onclick="toggleTheme()">
                <span id="themeIcon">🌙</span>&nbsp; Trocar Tema
            </div>
            <div class="menu-item" onclick="clearCurrentQueue()">
                <span>🧹</span>&nbsp; Limpar Fila Atual
            </div>
            <div class="menu-item danger" onclick="clearAllQueues()">
                <span>⚠️</span>&nbsp; Limpar Tudo
            </div>
        </div>
    </div>

    <h1>Gestão de Filas</h1>
    <p class="hint">
        <b>Mouse:</b> 2 cliques (Atendido) | Botão Direito (Excluir)<br>
        <b>Celular:</b> Arrastar não é mais necessário. Use os botões e 2 cliques.
    </p>

    <div class="tab-container" id="tabs"></div>
    <div id="queue-container"></div>

    <script>
const queues = ['medica', 'vacinas', 'enfermeira', 'psicologa', 'nutricionista', 'dentista', 'novo1', 'novo2'];
let currentActiveTab = 'medica';
let queueCounters = {};
queues.forEach(q => queueCounters[q] = { normal: 0, prioridade: 0 });

const scriptURL = "https://script.google.com/macros/s/AKfycbx7EZWyBXv5o-FjQ6ufq5DKNayATcBFMDz6540oBuzxwg0M-HCuGP_hZYGzHeg_iHRH/exec";

async function saveToLocalStorage() {
    const data = {};
    queues.forEach(q => {
        const list = document.getElementById(`list-${q}`);
        data[q] = {
            html: list.innerHTML,
            counters: queueCounters[q]
        };
    });
    localStorage.setItem('queue_data', JSON.stringify(data));
    try {
        await fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ action: "save", payload: JSON.stringify(data) })
        });
    } catch (e) { console.error("Erro na nuvem", e); }
}

async function loadFromLocalStorage() {
    const saved = localStorage.getItem('queue_data');
    if (saved) renderData(JSON.parse(saved));
    try {
        const response = await fetch(scriptURL);
        const cloudData = await response.json();
        if (cloudData) {
            renderData(cloudData);
            localStorage.setItem('queue_data', JSON.stringify(cloudData));
        }
    } catch (e) { console.log("Modo offline."); }
}

function renderData(data) {
    queues.forEach(q => {
        if (data[q]) {
            const list = document.getElementById(`list-${q}`);
            list.innerHTML = data[q].html;
            queueCounters[q] = data[q].counters;
            // Reatribui eventos aos botões carregados
            list.querySelectorAll('.queue-item').forEach(li => attachEvents(li));
        }
    });
}

function init() {
    const tabsDiv = document.getElementById('tabs');
    const container = document.getElementById('queue-container');

    queues.forEach((q, index) => {
        const btn = document.createElement('button');
        btn.className = `tab-button ${index === 0 ? 'active' : ''}`;
        btn.id = `btn-${q}`;
        btn.innerText = q.charAt(0).toUpperCase() + q.slice(1);
        btn.onclick = () => openTab(q);
        tabsDiv.appendChild(btn);

        const content = document.createElement('div');
        content.id = q;
        content.className = `tab-content ${index === 0 ? 'active' : ''}`;
        content.innerHTML = `
            <div class="input-section">
                <input type="text" id="input-${q}" placeholder="Nome do paciente">
                <select id="prio-${q}">
                    <option value="normal">Normal</option>
                    <option value="prioridade">Prioridade</option>
                </select>
                <button onclick="addPatient('${q}')">Adicionar Paciente</button>
            </div>
            <ul id="list-${q}" class="queue-list"></ul>
        `;
        container.appendChild(content);
    });
    loadFromLocalStorage();
}

function toggleMenu() { document.getElementById('menuOptions').classList.toggle('active'); }

function toggleTheme() {
    const body = document.documentElement;
    const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    body.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    document.getElementById('themeIcon').textContent = newTheme === 'dark' ? '☀️' : '🌙';
    toggleMenu();
}

function openTab(tabName) {
    currentActiveTab = tabName;
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    document.getElementById(`btn-${tabName}`).classList.add('active');
}

function addPatient(queueId) {
    const input = document.getElementById(`input-${queueId}`);
    const prio = document.getElementById(`prio-${queueId}`).value;
    if (!input.value.trim()) return;

    queueCounters[queueId][prio]++;
    const senha = `${queueCounters[queueId][prio]}${prio[0].toUpperCase()}`;
    
    const li = document.createElement('li');
    li.className = `queue-item ${prio}`;
    li.innerHTML = `
        <span data-senha="${senha}">${senha} - ${input.value}</span>
        <div class="actions-group">
            <button class="btn-action" title="Editar" onclick="editItem(this.closest('.queue-item'))">✏️</button>
            <button class="btn-action btn-delete" title="Excluir" onclick="deleteItem(this.closest('.queue-item'))">🗑️</button>
            <div class="order-controls">
                <button class="btn-action" onclick="moveUp(this.closest('.queue-item'))">▲</button>
                <button class="btn-action" onclick="moveDown(this.closest('.queue-item'))">▼</button>
            </div>
        </div>
    `;
    
    attachEvents(li);
    document.getElementById(`list-${queueId}`).prepend(li);
    input.value = '';
    saveToLocalStorage();
}

// Unifica os eventos de clique e toque
function attachEvents(el) {
    // Clique duplo para marcar como atendido (Funciona em PC e Celular)
    el.addEventListener('dblclick', (e) => {
        if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
            el.classList.toggle('atendido');
            saveToLocalStorage();
        }
    });

    // Botão direito para excluir (Funciona em PC)
    el.oncontextmenu = (e) => {
        e.preventDefault();
        deleteItem(el);
    };
}

function editItem(el) {
    if (el.classList.contains('atendido')) return;
    const span = el.querySelector('span');
    const currentFullText = span.innerText;
    const senha = span.getAttribute('data-senha');
    const nameOnly = currentFullText.split(' - ')[1];
    
    const input = document.createElement('input');
    input.className = 'editable-name';
    input.value = nameOnly;
    span.style.display = 'none';
    span.parentNode.insertBefore(input, span);
    input.focus();

    const finishEdit = () => {
        span.innerText = `${senha} - ${input.value || nameOnly}`;
        span.style.display = 'block';
        input.remove();
        saveToLocalStorage();
    };

    input.onblur = finishEdit;
    input.onkeydown = (e) => { if(e.key === 'Enter') finishEdit(); };
}

function deleteItem(el) {
    if(confirm("Deseja excluir este paciente?")) {
        el.style.opacity = '0';
        setTimeout(() => {
            el.remove();
            saveToLocalStorage();
        }, 200);
    }
}

function moveUp(el) {
    const prev = el.previousElementSibling;
    if (prev) {
        el.parentNode.insertBefore(el, prev);
        saveToLocalStorage();
    }
}

function moveDown(el) {
    const next = el.nextElementSibling;
    if (next) {
        el.parentNode.insertBefore(next, el);
        saveToLocalStorage();
    }
}

function clearCurrentQueue() {
    if (confirm(`Zerar fila de ${currentActiveTab.toUpperCase()}?`)) {
        queueCounters[currentActiveTab] = { normal: 0, prioridade: 0 };
        document.getElementById(`list-${currentActiveTab}`).innerHTML = '';
        saveToLocalStorage();
        toggleMenu();
    }
}

function clearAllQueues() {
    if (confirm("ATENÇÃO: Deseja zerar TODAS as filas?")) {
        queues.forEach(q => {
            queueCounters[q] = { normal: 0, prioridade: 0 };
            document.getElementById(`list-${q}`).innerHTML = '';
        });
        saveToLocalStorage();
        toggleMenu();
    }
}

window.onclick = (e) => {
    if (!e.target.matches('.main-menu-btn')) document.getElementById('menuOptions').classList.remove('active');
};

const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeIcon').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

init();
    </script>
</body>
</html>
