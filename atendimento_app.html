<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Filas - PSF</title>
    <style>
        :root {
            --bg-body: #f4f4f4;
            --bg-card: #ffffff;
            --text-main: #333333;
            --border-color: #dddddd;
            --tab-inactive: #eeeeee;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --border-color: #333333;
            --tab-inactive: #2c2c2c;
        }

        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        h1 { text-align: center; font-size: 1.5rem; }

        /* Botão Dark Mode */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 20px;
            z-index: 1000;
        }

        /* Abas em Grade para Mobile */
        .tab-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 5px;
            margin-bottom: 20px;
        }

        .tab-button {
            background-color: var(--tab-inactive);
            border: none;
            padding: 12px 5px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 8px;
            color: var(--text-main);
            font-weight: bold;
        }

        .tab-button.active {
            background-color: #007bff;
            color: white;
        }

        .tab-content {
            display: none;
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tab-content.active { display: block; }

        /* Seção de Entrada */
        .input-section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: rgba(150, 150, 150, 0.05);
        }

        .input-section label { display: block; margin-bottom: 8px; font-weight: bold; }

        .input-section input, .input-section select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 16px;
        }

        .input-section button {
            width: 100%;
            background-color: #007bff;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
        }

        /* Lista em Cards Mobile */
        .queue-list { list-style: none; padding: 0; }

        .queue-item {
            background-color: var(--bg-card);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            border-left: 6px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .queue-item.prioridade { border-left-color: #dc3545; }
        .queue-item.normal { border-left-color: #28a745; }
        .queue-item.atendido { opacity: 0.4; text-decoration: line-through; }

        .queue-item span { font-size: 1.1rem; font-weight: bold; }

        /* Grade de Ações */
        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .actions button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            color: white;
        }

        .mark-attended { background-color: #28a745; grid-column: span 2; }
        .edit-patient { background-color: #007bff; }
        .delete-patient { background-color: #dc3545; }
        .move-up, .move-down { background-color: #ffc107; color: #333 !important; }

        .editable-name {
            width: 100%;
            padding: 10px;
            background: var(--bg-body);
            color: var(--text-main);
            border: 1px solid #007bff;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <h1>Gestão de Filas</h1>

    <div class="tab-container">
        <button class="tab-button active" onclick="openTab('medica')">Médica</button>
        <button class="tab-button" onclick="openTab('vacinas')">Vacinas</button>
        <button class="tab-button" onclick="openTab('enfermeira')">Enfermeira</button>
        <button class="tab-button" onclick="openTab('psicologa')">Psicóloga</button>
        <button class="tab-button" onclick="openTab('nutricionista')">Nutricionista</button>
        <button class="tab-button" onclick="openTab('dentista')">Dentista</button>
        <button class="tab-button" onclick="openTab('novo1')">Novo 1</button>
        <button class="tab-button" onclick="openTab('novo2')">Novo 2</button>
    </div>

    <div id="medica" class="tab-content active">
        <h2>Fila da Médica</h2>
        <div class="input-section">
            <input type="text" id="patientNameMedica" placeholder="Nome do paciente">
            <select id="priorityMedica">
                <option value="normal">Normal</option>
                <option value="prioridade">Prioridade</option>
            </select>
            <button onclick="addPatient('medica')">Adicionar Paciente</button>
        </div>
        <ul id="queueListMedica" class="queue-list"></ul>
    </div>

    <div id="vacinas" class="tab-content">
        <h2>Fila de Vacinas</h2>
        <div class="input-section">
            <input type="text" id="patientNameVacinas" placeholder="Nome do paciente">
            <select id="priorityVacinas">
                <option value="normal">Normal</option>
                <option value="prioridade">Prioridade</option>
            </select>
            <button onclick="addPatient('vacinas')">Adicionar Paciente</button>
        </div>
        <ul id="queueListVacinas" class="queue-list"></ul>
    </div>

    <script>
        const queueCounters = {
            medica: { normal: 0, prioridade: 0 },
            vacinas: { normal: 0, prioridade: 0 },
            enfermeira: { normal: 0, prioridade: 0 },
            psicologa: { normal: 0, prioridade: 0 },
            nutricionista: { normal: 0, prioridade: 0 },
            dentista: { normal: 0, prioridade: 0 },
            novo1: { normal: 0, prioridade: 0 },
            novo2: { normal: 0, prioridade: 0 }
        };

        // Gerenciamento de Tema
        function toggleTheme() {
            const body = document.documentElement;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeBtn').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // Carregar tema salvo
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        function openTab(tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) c.classList.remove("active");
            
            const buttons = document.getElementsByClassName("tab-button");
            for (let b of buttons) b.classList.remove("active");
            
            const target = document.getElementById(tabName);
            if(target) target.classList.add("active");
            event.currentTarget.classList.add("active");
        }

        function addPatient(queueId) {
            const idSuffix = queueId.charAt(0).toUpperCase() + queueId.slice(1);
            const input = document.getElementById('patientName' + idSuffix);
            const prioritySelect = document.getElementById('priority' + idSuffix);
            const queueList = document.getElementById('queueList' + idSuffix);

            if (!input.value.trim()) return alert('Insira o nome!');

            const priority = prioritySelect.value;
            queueCounters[queueId][priority]++;
            const senha = `${queueCounters[queueId][priority]}${priority[0].toUpperCase()}`;

            const li = document.createElement('li');
            li.className = `queue-item ${priority}`;
            li.innerHTML = `
                <span data-senha="${senha}" data-original-name="${input.value}">${senha} - ${input.value}</span>
                <div class="actions">
                    <button class="mark-attended" onclick="toggleAttended(this)">Atendido</button>
                    <button class="edit-patient" onclick="editPatient(this)">Editar</button>
                    <button class="move-up" onclick="movePatient(this, 'up')">⬆️</button>
                    <button class="move-down" onclick="movePatient(this, 'down')">⬇️</button>
                    <button class="delete-patient" onclick="deletePatient(this)">Excluir</button>
                </div>
            `;
            queueList.appendChild(li);
            input.value = '';
        }

        function toggleAttended(btn) {
            const item = btn.closest('.queue-item');
            item.classList.toggle('atendido');
            btn.textContent = item.classList.contains('atendido') ? 'Desfazer' : 'Atendido';
        }

        function movePatient(btn, dir) {
            const item = btn.closest('.queue-item');
            const list = item.parentNode;
            if (dir === 'up' && item.previousElementSibling) list.insertBefore(item, item.previousElementSibling);
            if (dir === 'down' && item.nextElementSibling) list.insertBefore(item.nextElementSibling, item);
        }

        function deletePatient(btn) {
            if (confirm('Excluir paciente?')) btn.closest('.queue-item').remove();
        }

        function editPatient(btn) {
            const item = btn.closest('.queue-item');
            const span = item.querySelector('span');
            const originalName = span.getAttribute('data-original-name');
            const senha = span.getAttribute('data-senha');

            const input = document.createElement('input');
            input.className = 'editable-name';
            input.value = originalName;
            span.replaceWith(input);
            input.focus();

            btn.textContent = 'Salvar';
            btn.onclick = function() {
                const newName = input.value.trim() || originalName;
                const newSpan = document.createElement('span');
                newSpan.setAttribute('data-senha', senha);
                newSpan.setAttribute('data-original-name', newName);
                newSpan.textContent = `${senha} - ${newName}`;
                input.replaceWith(newSpan);
                btn.textContent = 'Editar';
                btn.onclick = function() { editPatient(this); };
            };
        }
    </script>
</body>
</html>
