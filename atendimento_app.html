<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Filas - PSF</title>
    <style>
        :root {
            --bg-body: #f4f4f4;
            --bg-card: #ffffff;
            --text-main: #333333;
            --border-color: #dddddd;
            --tab-inactive: #eeeeee;
            --danger: #dc3545;
            --warning: #ffc107;
            --primary: #007bff;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --border-color: #333333;
            --tab-inactive: #2c2c2c;
        }

        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 10px; }

        /* Menu de Funcionalidades Flutuante */
        .menu-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .main-menu-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 24px;
        }

        .menu-options {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            width: 200px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .menu-options.active { display: block; }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 5px;
            background: rgba(150,150,150,0.1);
        }

        .menu-item:hover { background: rgba(150,150,150,0.2); }

        /* Botões de Limpeza */
        .clear-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-clear {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            color: white;
        }
        .clear-current { background-color: var(--warning); color: #333; }
        .clear-all { background-color: var(--danger); }

        /* Abas */
        .tab-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 5px;
            margin-bottom: 20px;
        }

        .tab-button {
            background-color: var(--tab-inactive);
            border: none;
            padding: 12px 5px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 8px;
            color: var(--text-main);
            font-weight: bold;
        }

        .tab-button.active { background-color: var(--primary); color: white; }

        .tab-content {
            display: none;
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tab-content.active { display: block; }

        /* Input */
        .input-section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: rgba(150, 150, 150, 0.05);
        }

        .input-section input, .input-section select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 16px;
        }

        .input-section button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Lista e Funcionalidade de Esconder Botões */
        .queue-list { list-style: none; padding: 0; }

        .queue-item {
            background-color: var(--bg-card);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 10px;
            border-left: 6px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .queue-item.prioridade { border-left-color: #dc3545; }
        .queue-item.normal { border-left-color: #28a745; }
        .queue-item.atendido { opacity: 0.4; text-decoration: line-through; }

        .queue-item span { font-size: 1.1rem; font-weight: bold; display: block; cursor: pointer; }

        /* Controlar visibilidade das ações */
        .hide-buttons .actions { display: none; }
        .hide-buttons .actions.show { display: grid; }

        .actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

        .actions button { padding: 10px; border: none; border-radius: 6px; font-weight: bold; color: white; }

        .mark-attended { background-color: #28a745; grid-column: span 2; }
        .edit-patient { background-color: var(--primary); }
        .delete-patient { background-color: var(--danger); }
        .move-up, .move-down { background-color: var(--warning); color: #333 !important; }

        .editable-name {
            width: 100%;
            padding: 10px;
            background: var(--bg-body);
            color: var(--text-main);
            border: 1px solid var(--primary);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <button class="main-menu-btn" onclick="toggleMenu()">⚙️</button>
        <div class="menu-options" id="menuOptions">
            <div class="menu-item" onclick="toggleTheme()">
                <span id="themeIcon">🌙</span>&nbsp; Trocar Tema
            </div>
            <div class="menu-item" onclick="toggleButtonVisibility()">
                <span>👁️</span>&nbsp; <span id="btnVisText">Esconder Botões</span>
            </div>
        </div>
    </div>

    <h1>Gestão de Filas</h1>

    <div class="clear-actions">
        <button class="btn-clear clear-current" onclick="clearCurrentQueue()">Limpar Fila Atual</button>
        <button class="btn-clear clear-all" onclick="clearAllQueues()">Limpar Tudo</button>
    </div>

    <div class="tab-container">
        <button class="tab-button active" onclick="openTab('medica')">Médica</button>
        <button class="tab-button" onclick="openTab('vacinas')">Vacinas</button>
        <button class="tab-button" onclick="openTab('enfermeira')">Enfermeira</button>
        <button class="tab-button" onclick="openTab('psicologa')">Psicóloga</button>
        <button class="tab-button" onclick="openTab('nutricionista')">Nutricionista</button>
        <button class="tab-button" onclick="openTab('dentista')">Dentista</button>
        <button class="tab-button" onclick="openTab('novo1')">Novo 1</button>
        <button class="tab-button" onclick="openTab('novo2')">Novo 2</button>
    </div>

    <div id="medica" class="tab-content active">
        <h2>Fila da Médica</h2>
        <div class="input-section">
            <input type="text" id="patientNameMedica" placeholder="Nome do paciente">
            <select id="priorityMedica">
                <option value="normal">Normal</option>
                <option value="prioridade">Prioridade</option>
            </select>
            <button onclick="addPatient('medica')">Adicionar Paciente</button>
        </div>
        <ul id="queueListMedica" class="queue-list"></ul>
    </div>

    <div id="vacinas" class="tab-content"><h2>Fila de Vacinas</h2><div class="input-section"><input type="text" id="patientNameVacinas" placeholder="Nome"><select id="priorityVacinas"><option value="normal">Normal</option><option value="prioridade">Prioridade</option></select><button onclick="addPatient('vacinas')">Adicionar</button></div><ul id="queueListVacinas" class="queue-list"></ul></div>
    <div id="enfermeira" class="tab-content"><h2>Fila da Enfermeira</h2><div class="input-section"><input type="text" id="patientNameEnfermeira" placeholder="Nome"><select id="priorityEnfermeira"><option value="normal">Normal</option><option value="prioridade">Prioridade</option></select><button onclick="addPatient('enfermeira')">Adicionar</button></div><ul id="queueListEnfermeira" class="queue-list"></ul></div>
    <div id="psicologa" class="tab-content"><h2>Fila da Psicóloga</h2><div class="input-section"><input type="text" id="patientNamePsicologa" placeholder="Nome"><select id="priorityPsicologa"><option value="normal">Normal</option><option value="prioridade">Prioridade</option></select><button onclick="addPatient('psicologa')">Adicionar</button></div><ul id="queueListPsicologa" class="queue-list"></ul></div>
    <div id="nutricionista" class="tab-content"><h2>Fila da Nutricionista</h2><div class="input-section"><input type="text" id="patientNameNutricionista" placeholder="Nome"><select id="priorityNutricionista"><option value="normal">Normal</option><option value="prioridade">Prioridade</option></select><button onclick="addPatient('nutricionista')">Adicionar</button></div><ul id="queueListNutricionista" class="queue-list"></ul></div>
    <div id="dentista" class="tab-content"><h2>Fila do Dentista</h2><div class="input-section"><input type="text" id="patientNameDentista" placeholder="Nome"><select id="priorityDentista"><option value="normal">Normal</option><option value="prioridade">Prioridade</option></select><button onclick="addPatient('dentista')">Adicionar</button></div><ul id="queueListDentista" class="queue-list"></ul></div>
    <div id="novo1" class="tab-content"><h2>Fila Novo 1</h2><div class="input-section"><input type="text" id="patientNameNovo1" placeholder="Nome"><select id="priorityNovo1"><option value="normal">Normal</option><option value="prioridade">Prioridade</option></select><button onclick="addPatient('novo1')">Adicionar</button></div><ul id="queueListNovo1" class="queue-list"></ul></div>
    <div id="novo2" class="tab-content"><h2>Fila Novo 2</h2><div class="input-section"><input type="text" id="patientNameNovo2" placeholder="Nome"><select id="priorityNovo2"><option value="normal">Normal</option><option value="prioridade">Prioridade</option></select><button onclick="addPatient('novo2')">Adicionar</button></div><ul id="queueListNovo2" class="queue-list"></ul></div>

    <script>
        let currentActiveTab = 'medica';
        let buttonsHidden = false;

        const queueCounters = {
            medica: { normal: 0, prioridade: 0 },
            vacinas: { normal: 0, prioridade: 0 },
            enfermeira: { normal: 0, prioridade: 0 },
            psicologa: { normal: 0, prioridade: 0 },
            nutricionista: { normal: 0, prioridade: 0 },
            dentista: { normal: 0, prioridade: 0 },
            novo1: { normal: 0, prioridade: 0 },
            novo2: { normal: 0, prioridade: 0 }
        };

        function toggleMenu() {
            document.getElementById('menuOptions').classList.toggle('active');
        }

        function toggleTheme() {
            const body = document.documentElement;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeIcon').textContent = newTheme === 'dark' ? '☀️' : '🌙';
            toggleMenu();
        }

        function toggleButtonVisibility() {
            buttonsHidden = !buttonsHidden;
            document.body.classList.toggle('hide-buttons', buttonsHidden);
            document.getElementById('btnVisText').textContent = buttonsHidden ? "Mostrar Botões" : "Esconder Botões";
            toggleMenu();
        }

        // Fecha o menu se clicar fora dele
        window.onclick = function(event) {
            if (!event.target.matches('.main-menu-btn')) {
                document.getElementById('menuOptions').classList.remove('active');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeIcon').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        function openTab(tabName) {
            currentActiveTab = tabName;
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) c.classList.remove("active");
            const buttons = document.getElementsByClassName("tab-button");
            for (let b of buttons) b.classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            event.currentTarget.classList.add("active");
        }

        function clearCurrentQueue() {
            if (confirm(`Zerar fila de ${currentActiveTab.toUpperCase()}?`)) {
                queueCounters[currentActiveTab] = { normal: 0, prioridade: 0 };
                const idSuffix = currentActiveTab.charAt(0).toUpperCase() + currentActiveTab.slice(1);
                document.getElementById('queueList' + idSuffix).innerHTML = '';
            }
        }

        function clearAllQueues() {
            if (confirm("Zerar TODAS as filas?")) {
                for (let q in queueCounters) {
                    queueCounters[q] = { normal: 0, prioridade: 0 };
                    const suffix = q.charAt(0).toUpperCase() + q.slice(1);
                    const list = document.getElementById('queueList' + suffix);
                    if(list) list.innerHTML = '';
                }
            }
        }

        function addPatient(queueId) {
            const suffix = queueId.charAt(0).toUpperCase() + queueId.slice(1);
            const input = document.getElementById('patientName' + suffix);
            const prio = document.getElementById('priority' + suffix).value;
            if (!input.value.trim()) return;

            queueCounters[queueId][prio]++;
            const senha = `${queueCounters[queueId][prio]}${prio[0].toUpperCase()}`;

            const li = document.createElement('li');
            li.className = `queue-item ${prio}`;
            li.innerHTML = `
                <span onclick="toggleItemActions(this)" data-senha="${senha}" data-original-name="${input.value}">
                    ${senha} - ${input.value}
                </span>
                <div class="actions">
                    <button class="mark-attended" onclick="toggleAttended(this)">Atendido</button>
                    <button class="edit-patient" onclick="editPatient(this)">Editar</button>
                    <button class="move-up" onclick="movePatient(this, 'up')">⬆️</button>
                    <button class="move-down" onclick="movePatient(this, 'down')">⬇️</button>
                    <button class="delete-patient" onclick="deletePatient(this)">Excluir</button>
                </div>
            `;
            document.getElementById('queueList' + suffix).appendChild(li);
            input.value = '';
        }

        function toggleItemActions(span) {
            if (buttonsHidden) {
                const actions = span.nextElementSibling;
                actions.classList.toggle('show');
            }
        }

        function toggleAttended(btn) {
            btn.closest('.queue-item').classList.toggle('atendido');
            btn.textContent = btn.closest('.queue-item').classList.contains('atendido') ? 'Desfazer' : 'Atendido';
        }

        function movePatient(btn, dir) {
            const item = btn.closest('.queue-item');
            if (dir === 'up' && item.previousElementSibling) item.parentNode.insertBefore(item, item.previousElementSibling);
            if (dir === 'down' && item.nextElementSibling) item.parentNode.insertBefore(item.nextElementSibling, item);
        }

        function deletePatient(btn) {
            if (confirm('Excluir?')) btn.closest('.queue-item').remove();
        }

        function editPatient(btn) {
            const item = btn.closest('.queue-item');
            const span = item.querySelector('span');
            const original = span.getAttribute('data-original-name');
            const senha = span.getAttribute('data-senha');
            const input = document.createElement('input');
            input.className = 'editable-name';
            input.value = original;
            span.replaceWith(input);
            input.focus();
            btn.textContent = 'Salvar';
            btn.onclick = function() {
                const val = input.value.trim() || original;
                const nSpan = document.createElement('span');
                nSpan.onclick = function() { toggleItemActions(this); };
                nSpan.setAttribute('data-senha', senha);
                nSpan.setAttribute('data-original-name', val);
                nSpan.textContent = `${senha} - ${val}`;
                input.replaceWith(nSpan);
                btn.textContent = 'Editar';
                btn.onclick = function() { editPatient(this); };
            };
        }
    </script>
</body>
</html>
