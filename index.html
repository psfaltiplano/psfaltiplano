<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Vertical</title>
    <style>
        body {
            margin: 0;
            padding: 10px; /* Pequeno respiro nas bordas da tela */
            display: flex;
            flex-direction: column; /* Alinha os itens em coluna (um abaixo do outro) */
            gap: 15px; /* Cria o espaço (gap) entre as imagens */
            background-color: #f4f4f4;
        }

        .foto-container {
            width: 100%; /* Ocupa a largura total disponível */
            box-sizing: border-box;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px; /* Opcional: arredonda levemente os cantos */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Opcional: dá profundidade */
        }
    </style>
</head>
<body>

    <div class="foto-container"><img src="images/foto1.jpg" alt="Foto 1"></div>
    <div class="foto-container"><img src="images/foto2.jpg" alt="Foto 2"></div>
    <div class="foto-container"><img src="images/foto3.jpg" alt="Foto 3"></div>
    <div class="foto-container"><img src="images/foto4.jpg" alt="Foto 4"></div>
    <div class="foto-container"><img src="images/foto5.jpg" alt="Foto 5"></div>
    <div class="foto-container"><img src="images/foto6.jpg" alt="Foto 6"></div>
    <div class="foto-container"><img src="images/foto7.jpg" alt="Foto 7"></div>
    <div class="foto-container"><img src="images/foto8.jpg" alt="Foto 8"></div>
    <div class="foto-container"><img src="images/foto9.jpg" alt="Foto 9"></div>
    <div class="foto-container"><img src="images/foto10.jpg" alt="Foto 10"></div>
    <div class="foto-container"><img src="images/foto11.jpg" alt="Foto 11"></div>

</body>
</html>
