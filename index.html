<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
    <style>
        body {
            margin: 0; padding: 15px; display: flex; flex-direction: row;
            flex-wrap: wrap; justify-content: center; align-items: flex-start;
            gap: 25px 15px; background-color: #0a192f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .separador-grupo { width: 100%; height: 5px; background: rgba(255, 255, 255, 0.1); margin: 10px 0; }

        h2 { 
            width: 100%; color: #ffffff; font-size: 1.5rem; margin: 20px 0 10px 0; 
            padding-left: 10px; border-left: 4px solid #3498db; 
        }

        /* Estilo das Observações - Ocupam 100% da largura */
        .paciente-obs {
            width: 100%;
            font-size: 1.1rem;
            color: #ffffff;
            background-color: #112240; 
            border-radius: 10px;
            padding: 12px; 
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
        }

        /* Container das imagens - Lado a lado (50% cada) */
        .foto-container {
            width: calc(50% - 7.5px); 
            box-sizing: border-box; 
            background-color: #112240; 
            border-radius: 12px;
            padding: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .numero-foto { font-weight: 600; font-size: 1.1rem; color: #ffffff; margin-bottom: 8px; display: block; }
        img { width: 100%; height: auto; border-radius: 8px; display: block; }
        a { text-decoration: none; }
    </style>
</head>
<body>

    <script>
        async function carregarDados() {
            try {
                const resposta = await fetch('images/pacientes.csv'); 
                const texto = await resposta.text();
                const linhas = texto.split('\n').slice(1);
                const containerPrincipal = document.body;
                
                let dadosAgrupados = {};

                // 1. Agrupar tudo por paciente primeiro
                linhas.forEach(linha => {
                    if (linha.trim() === "") return;
                    const colunas = linha.split(',');
                    const nome = colunas[0]?.trim();
                    const numero = colunas[1]?.trim();
                    const arquivo = colunas[2]?.trim();
                    const obs = colunas[3]?.trim();

                    if (!dadosAgrupados[nome]) {
                        dadosAgrupados[nome] = { observacoes: [], imagens: [] };
                    }
                    if (obs) dadosAgrupados[nome].observacoes.push(obs);
                    if (arquivo && arquivo !== "nenhum") {
                        dadosAgrupados[nome].imagens.push({ numero, arquivo });
                    }
                });

                // 2. Renderizar na ordem correta
                for (const paciente in dadosAgrupados) {
                    // Título e Separador
                    containerPrincipal.insertAdjacentHTML('beforeend', `<div class="separador-grupo"></div><h2>${paciente}</h2>`);

                    // PRIMEIRO: Todos os Textos (cada um em sua linha)
                    dadosAgrupados[paciente].observacoes.forEach(textoObs => {
                        const divObs = document.createElement('div');
                        divObs.className = 'paciente-obs';
                        divObs.innerHTML = `<strong>•</strong> ${textoObs}`;
                        containerPrincipal.appendChild(divObs);
                    });

                    // DEPOIS: Todas as Imagens (lado a lado)
                    dadosAgrupados[paciente].imagens.forEach(imgData => {
                        const caminho = `images/${imgData.arquivo}`;
                        const htmlCard = `
                            <div class="foto-container">
                                ${imgData.numero ? `<span class="numero-foto">${imgData.numero}</span>` : ''}
                                <a href="${caminho}" target="_blank">
                                    <img src="${caminho}" alt="Receita">
                                </a>
                            </div>
                        `;
                        containerPrincipal.insertAdjacentHTML('beforeend', htmlCard);
                    });
                }

            } catch (erro) {
                console.error("Erro:", erro);
            }
        }

        carregarDados();
    </script>
</body>
</html>
