<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
    <link rel="shortcut icon" href="logos/174459704290.png">
    <style>
        body {
            margin: 0; padding: 15px; display: flex; flex-direction: row;
            flex-wrap: wrap; justify-content: center; align-items: flex-start;
            gap: 25px 15px; background-color: #0a192f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .separador-grupo { width: 100%; height: 5px; background: rgba(255, 255, 255, 0.1); margin: 10px 0; }

        h2 { 
            width: 100%; color: #ffffff; font-size: 1.5rem; margin: 20px 0 5px 0; 
            padding-left: 10px; border-left: 4px solid #3498db; 
        }

        /* Área de observação logo abaixo do nome */
        .paciente-obs {
            color: white;
            background-color: #112240; border-radius: 12px;
            padding: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .foto-container {
            width: calc(50% - 7.5px); box-sizing: border-box; display: flex;
            flex-direction: column; background-color: #112240; border-radius: 12px;
            padding: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .numero-foto { font-weight: 600; font-size: 1.1rem; color: #ffffff; margin-bottom: 8px; display: block; }

        img { width: 100%; height: auto; border-radius: 8px; display: block; }
        
        a { text-decoration: none; }
    </style>
</head>
<body>

    <script>
        async function carregarDados() {
            try {
                const resposta = await fetch('images/pacientes.csv'); 
                const dados = await Math.max(0, (await resposta.text())); // Fallback para texto
                const textoLimpo = await fetch('images/pacientes.csv').then(r => r.text());
                
                const linhas = textoLimpo.split('\n').slice(1);
                const containerPrincipal = document.body;
                let ultimoPaciente = "";

                linhas.forEach(linha => {
                    if (linha.trim() === "") return;

                    const colunas = linha.split(',');
                    const nomePaciente = colunas[0]?.trim();
                    const numero = colunas[1]?.trim();
                    const nomeArquivo = colunas[2]?.trim();
                    const observacao = colunas[3]?.trim();

                    // Se mudar o paciente, cria o cabeçalho e a observação dele
                    if (nomePaciente !== ultimoPaciente) {
                        const divisor = document.createElement('div');
                        divisor.className = 'separador-grupo';
                        containerPrincipal.appendChild(divisor);

                        const titulo = document.createElement('h2');
                        titulo.textContent = nomePaciente;
                        containerPrincipal.appendChild(titulo);

                        // Adiciona a observação abaixo do nome se ela existir
                        if (observacao && observacao !== "") {
                            const divObs = document.createElement('div');
                            divObs.className = 'paciente-obs';
                            divObs.textContent = observacao;
                            containerPrincipal.appendChild(divObs);
                        }
                        
                        ultimoPaciente = nomePaciente;
                    }

                    // Se houver nome de arquivo, gera o card da foto
                    if (nomeArquivo && nomeArquivo !== "" && nomeArquivo !== "nenhum") {
                        const caminho = `images/${nomeArquivo}`;
                        const htmlCard = `
                            <div class="foto-container">
                                <span class="numero-foto">${numero}</span>
                                <a href="${caminho}" target="_blank">
                                    <img src="${caminho}" alt="Receita">
                                </a>
                            </div>
                        `;
                        containerPrincipal.insertAdjacentHTML('beforeend', htmlCard);
                    }
                });

            } catch (erro) {
                console.error("Erro ao processar o CSV:", erro);
            }
        }

        carregarDados();
    </script>
</body>
</html>
