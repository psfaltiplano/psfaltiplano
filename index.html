<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Receitas - Ajuste Automático</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0a192f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            height: 100vh; /* Ocupa exatamente a altura da tela */
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Proíbe barras de rolagem no corpo */
        }

        /* --- CABEÇALHO --- */
        header {
            flex-shrink: 0; /* Impede que o cabeçalho seja esmagado */
            padding: 10px;
            background: #112240;
            border-bottom: 2px solid #3498db;
            text-align: center;
            z-index: 30;
        }

        .info-topo { margin: 0; font-size: 1.1rem; }
        .contador { display: block; font-size: 0.85rem; color: #3498db; margin-top: 3px; font-weight: bold; }

        /* --- ÁREA DA IMAGEM --- */
        main {
            flex: 1; /* Ocupa todo o espaço restante abaixo do header */
            position: relative; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%; /* Garante que o container não cresça além da tela */
            background-color: #060d1a;
            overflow: hidden;
        }

        .foto-container {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            padding: 10px; /* Pequeno respiro lateral */
        }

        .foto-container.active {
            display: flex;
        }

        .foto-container img {
            /* O SEGREDO DO AJUSTE AQUI: */
            max-width: 100%; 
            max-height: 100%; 
            width: auto;
            height: auto;
            object-fit: contain; /* Encaixa a imagem inteira sem cortar */
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* --- BOTÕES LATERAIS --- */
        .btn-nav {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 60px;
            background: rgba(0, 0, 0, 0.15);
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 3rem;
            cursor: pointer;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
        }

        .btn-prev { left: 0; }
        .btn-next { right: 0; }

        .btn-nav:not(:disabled):hover {
            background: rgba(52, 152, 219, 0.2);
            color: white;
        }

        .btn-nav:disabled {
            display: none; /* Esconde se não houver mais fotos */
        }

        @media (max-width: 600px) {
            .btn-nav { width: 45px; font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h2 class="info-topo">
            <span id="display-paciente">Carregando...</span>
            <span id="display-contador" class="contador">0/0</span>
        </h2>
    </header>

    <main>
        <button id="btnPrev" class="btn-nav btn-prev" onclick="mudarSlide(-1)">&#10094;</button>
        
        <div id="galeria-fotos" style="width:100%; height:100%;">
            <div class="foto-container active" data-paciente="Paciente Silva" data-index="1" data-total="3">
                <img src="images/foto1.jpg">
            </div>
            <div class="foto-container" data-paciente="Paciente Silva" data-index="2" data-total="3">
                <img src="images/foto1.1.jpg">
            </div>
            <div class="foto-container" data-paciente="Paciente Silva" data-index="3" data-total="3">
                <img src="images/foto1.2.jpg">
            </div>

            <div class="foto-container" data-paciente="Paciente Santos" data-index="1" data-total="1">
                <img src="images/foto2.jpg">
            </div>

            <div class="foto-container" data-paciente="Paciente Oliveira" data-index="1" data-total="3">
                <img src="images/foto3.jpg">
            </div>
            <div class="foto-container" data-paciente="Paciente Oliveira" data-index="2" data-total="3">
                <img src="images/foto3.1.jpg">
            </div>
            <div class="foto-container" data-paciente="Paciente Oliveira" data-index="3" data-total="3">
                <img src="images/foto3.2.jpg">
            </div>
        </div>

        <button id="btnNext" class="btn-nav btn-next" onclick="mudarSlide(1)">&#10095;</button>
    </main>

    <script>
        let slideIndex = 0;
        const slides = document.querySelectorAll('.foto-container');
        const displayPaciente = document.getElementById('display-paciente');
        const displayContador = document.getElementById('display-contador');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');

        function atualizarInterface() {
            const atual = slides[slideIndex];
            displayPaciente.textContent = atual.getAttribute('data-paciente');
            displayContador.textContent = `${atual.getAttribute('data-index')}/${atual.getAttribute('data-total')}`;

            btnPrev.disabled = (slideIndex === 0);
            btnNext.disabled = (slideIndex === slides.length - 1);
        }

        function mudarSlide(passo) {
            const novoIndex = slideIndex + passo;
            if (novoIndex >= 0 && novoIndex < slides.length) {
                slides[slideIndex].classList.remove('active');
                slideIndex = novoIndex;
                slides[slideIndex].classList.add('active');
                atualizarInterface();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") mudarSlide(-1);
            if (e.key === "ArrowRight") mudarSlide(1);
        });

        atualizarInterface();
    </script>
</body>
</html>
