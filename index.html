<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria com Links</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: #f4f4f4;
            align-items: center;
        }

        .foto-container {
            width: 100%;
            max-width: 800px; /* Limita a largura em telas grandes para não distorcer */
            box-sizing: border-box;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: opacity 0.3s ease;
        }

        /* Efeito visual para indicar que é clicável */
        
    </style>
</head>
<body>
<p>1</p>
    <div class="foto-container"><a href="images/foto1.jpg" target="_blank"><img src="images/foto1.jpg" alt="Foto 1"></a></div>
