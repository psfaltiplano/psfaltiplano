<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center; 
            align-items: flex-start;
            gap: 25px 15px; 
            background-color: #0a192f; /* Azul Marinho Profundo */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Divisor para separar os grupos de receitas */
        .separador-grupo {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 0;
        }

        .foto-container {
            width: calc(50% - 7.5px); 
            max-height: 70vh; /* LIMITA A ALTURA A 70% DA TELA */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background-color: #112240; /* Azul um pouco mais claro para o card */
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden; /* Evita que o conteúdo escape do card */
        }

        /* Mantém o alinhamento à esquerda para itens ímpares */
        body::after {
            content: "";
            width: calc(50% - 7.5px);
        }

        .numero-foto {
            font-weight: 600;
            font-size: 1.1rem;
            color: #ffffff; /* Letras Brancas */
            margin: 5px 0 10px 5px;
            display: block;
            letter-spacing: 0.5px;
            flex-shrink: 0; /* Impede que o número seja esmagado */
        }

        /* Container do link para centralizar a imagem */
        .foto-container a {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            overflow: hidden;
        }

        img {
            max-width: 100%;
            max-height: 100%; /* FAZ A IMAGEM RESPEITAR O LIMITE DO CONTAINER */
            width: auto;
            height: auto;
            object-fit: contain; /* AJUSTA A FOTO SEM CORTAR */
            display: block;
            border-radius: 8px;
            transition: transform 0.2s ease;
        }

        img:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="separador-grupo"></div>

    <h2 style="width: 100%; color: #ffffff; font-size: 1.5rem; margin-bottom: 10px; padding-left: 5px; border-left: 4px solid #3498db; font-family: 'Segoe UI', sans-serif;">
        Paciente Sobrenome
    </h2>

    <div class="foto-container">
        <span class="numero-foto">#1</span>
        <a href="images/foto1.jpg" target="_blank"><img src="images/foto1.jpg" alt="Receita 1"></a>
    </div>

    <div class="foto-container">
        <span class="numero-foto">#1.1</span>
        <a href="images/foto1.1.jpg" target="_blank"><img src="images/foto1.1.jpg" alt="Receita 1.1"></a>
    </div>

    <div class="foto-container">
        <span class="numero-foto">#1.2</span>
        <a href="images/foto1.2.jpg" target="_blank"><img src="images/foto1.2.jpg" alt="Receita 1.2"></a>
    </div>

    <div class="separador-grupo"></div>

    <h2 style="width: 100%; color: #ffffff; font-size: 1.5rem; margin-bottom: 10px; padding-left: 5px; border-left: 4px solid #3498db; font-family: 'Segoe UI', sans-serif;">
       Paciente Sobrenome
    </h2>

    <div class="foto-container">
        <span class="numero-foto">#2</span>
        <a href="images/foto2.jpg" target="_blank"><img src="images/foto2.jpg" alt="Receita 2"></a>
    </div>

    <div class="separador-grupo"></div>

    <h2 style="width: 100%; color: #ffffff; font-size: 1.5rem; margin-bottom: 10px; padding-left: 5px; border-left: 4px solid #3498db; font-family: 'Segoe UI', sans-serif;">
        Paciente Sobrenome
    </h2>

    <div class="foto-container">
        <span class="numero-foto">#3</span>
        <a href="images/foto3.jpg" target="_blank"><img src="images/foto3.jpg" alt="Receita 3"></a>
    </div>

    <div class="foto-container">
        <span class="numero-foto">#3.1</span>
        <a href="images/foto3.1.jpg" target="_blank"><img src="images/foto3.1.jpg" alt="Receita 3.1"></a>
    </div>

    <div class="foto-container">
        <span class="numero-foto">#3.2</span>
        <a href="images/foto3.2.jpg" target="_blank"><img src="images/foto3.2.jpg" alt="Receita 3.2"></a>
    </div>
    
    <div class="separador-grupo"></div>
    
</body>
</html>
